<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Librarian Workstation</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light p-4">

    <div class="container mx-auto" style="max-width: 1200px;">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2 class="fw-bold text-dark mb-0">📖 Librarian Desk</h2>
                <p class="text-muted mb-0">Daily Operations & Catalog Management</p>
            </div>
            <a href="/" class="btn btn-outline-danger fw-bold">Log Out</a>
        </div>
        
        <div class="row g-4">
            <div class="col-md-5">
                <div class="card shadow-sm border-0 mb-4">
                    <div class="card-body p-4">
                        <h5 class="fw-bold text-primary mb-3">🔄 Issue Book Transaction</h5>
                        <form>
                            <div class="mb-3">
                                <label class="form-label small fw-bold">Scan/Enter Student Admission No</label>
                                <input type="text" class="form-control" placeholder="e.g. 4500">
                            </div>
                            <div class="mb-3">
                                <label class="form-label small fw-bold">Scan/Enter Book Unique ID</label>
                                <input type="text" class="form-control" placeholder="e.g. BK-101">
                            </div>
                            <button type="button" class="btn btn-primary w-100 fw-bold">Complete Issue</button>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-md-7">
                <div class="card shadow-sm border-0 p-3">
                    <h5 class="fw-bold text-dark mb-3">📚 Library Quick Look</h5>
                    <p class="text-muted small">This workspace is focused purely on tracking book circulation and student status records seamlessly.</p>
                    <hr>
                    <span class="badge bg-secondary p-2">Ready for Operation</span>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
