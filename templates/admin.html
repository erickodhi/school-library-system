<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Add Book</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light p-5">

    <div class="container" style="max-width: 500px;">
        <div class="card shadow-sm">
            <div class="card-body">
                <h4 class="card-title fw-bold text-warning mb-4">📚 Add New Book Inventory</h4>
                
                <form action="/save_book_to_db" method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Book Unique ID</label>
                        <input type="text" name="html_book_id" class="form-control" placeholder="e.g. BK-101" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Book Title</label>
                        <input type="text" name="html_book_title" class="form-control" placeholder="e.g. KLB Mathematics" required>
                    </div>
                    <button type="submit" class="btn btn-warning w-100 fw-bold">Save Book</button>
                </form>
                
            </div>
        </div>
    </div>

</body>
</html>
