<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library System - Fresh Start</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light p-5">

    <div class="container" style="max-width: 600px;">
        <div class="card shadow-sm border-0 mb-5">
            <div class="card-body p-4">
                <h4 class="card-title fw-bold text-warning mb-4">📚 Add New Book</h4>
                <form action="/save_book" method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-bold small">Book Unique ID</label>
                        <input type="text" name="book_id_from_html" class="form-control" placeholder="e.g. BK-101" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-bold small">Book Title</label>
                        <input type="text" name="book_title_from_html" class="form-control" placeholder="e.g. KLB Mathematics" required>
                    </div>
                    <button type="submit" class="btn btn-warning w-100 fw-bold text-dark">Save to System</button>
                </form>
            </div>
        </div>

        <div class="card shadow-sm border-0">
            <div class="card-body p-4">
                <h5 class="fw-bold text-dark mb-3">📖 Current Book Inventory</h5>
                <table class="table table-hover align-middle">
                    <thead class="table-light">
                        <tr>
                            <th>Unique ID</th>
                            <th>Book Title</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for book in books %}
                        <tr>
                            <td class="fw-bold text-secondary">{{ book.unique_id }}</td>
                            <td>{{ book.title }}</td>
                        </tr>
                        {% else %}
                        <tr>
                            <td colspan="2" class="text-center text-muted py-3 small">No books in inventory yet.</td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</body>
</html>
